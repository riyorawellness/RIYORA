# =============================================================================
# RIYORA Wellness — Production docker-compose
# =============================================================================
# Services:
#   • mongo     — MongoDB 7, persistent volume
#   • backend   — FastAPI + Firebase Admin SDK (verifies ID tokens)
#   • frontend  — React SPA served by nginx (static build)
#   • nginx     — TLS-terminating reverse proxy + certbot
#   • certbot   — Let's Encrypt renewer (runs every 12h)
#
# BOOTSTRAP:
#   1. Copy `.env.example` → `.env`, fill in values
#   2. Copy `firebase-admin.json` into `backend/`
#   3. Run `./scripts/deploy.sh` (or the manual steps in DEPLOYMENT.md)

services:
  mongo:
    image: mongo:7
    container_name: riyora-mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - mongo_data:/data/db
      - ./backups:/backups
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks: [ riyora ]

  backend:
    build:
      context: ../backend
      dockerfile: ../deploy/backend/Dockerfile
    container_name: riyora-backend
    restart: always
    env_file: .env
    environment:
      MONGO_URL: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD}@mongo:27017/?authSource=admin
    volumes:
      # Firebase service account JSON — NEVER put this in git.
      - ../backend/firebase-admin.json:/app/firebase-admin.json:ro
      # Ops scripts (backup_mongo.sh + restore_mongo.sh) — read-only.
      # Also enables cron on the host to invoke them via docker exec.
      - ../scripts:/app/scripts:ro
      # Upload / invoice / backup volumes so a container restart doesn't lose files.
      - uploads:/app/uploads
      - invoices:/app/invoices
      - ./backups:/app/backups
    depends_on:
      mongo:
        condition: service_healthy
    expose: [ "8001" ]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks: [ riyora ]

  frontend:
    build:
      context: ../frontend
      dockerfile: ../deploy/frontend/Dockerfile
      # Build args = compile-time env vars baked into the React bundle
      args:
        REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL}
        REACT_APP_FIREBASE_API_KEY: ${REACT_APP_FIREBASE_API_KEY}
        REACT_APP_FIREBASE_AUTH_DOMAIN: ${REACT_APP_FIREBASE_AUTH_DOMAIN}
        REACT_APP_FIREBASE_PROJECT_ID: ${REACT_APP_FIREBASE_PROJECT_ID}
        REACT_APP_FIREBASE_STORAGE_BUCKET: ${REACT_APP_FIREBASE_STORAGE_BUCKET}
        REACT_APP_FIREBASE_MESSAGING_SENDER_ID: ${REACT_APP_FIREBASE_MESSAGING_SENDER_ID}
        REACT_APP_FIREBASE_APP_ID: ${REACT_APP_FIREBASE_APP_ID}
    container_name: riyora-frontend
    restart: always
    expose: [ "80" ]
    networks: [ riyora ]

  nginx:
    image: nginx:1.27-alpine
    container_name: riyora-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on: [ backend, frontend ]
    networks: [ riyora ]
    # NGINX reloads every 6h to pick up renewed certificates.
    command: >
      /bin/sh -c "while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g 'daemon off;'"

  certbot:
    image: certbot/certbot:latest
    container_name: riyora-certbot
    restart: always
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on: [ nginx ]
    # Renew every 12h; certificates are only actually renewed when they're < 30 days from expiry.
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"

volumes:
  mongo_data:
  uploads:
  invoices:

networks:
  riyora:
    driver: bridge
