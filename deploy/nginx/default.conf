# =============================================================================
# RIYORA Wellness — outer nginx (TLS + reverse proxy)
# =============================================================================
# Serves two subdomains from ONE nginx:
#   - $DOMAIN        (default: app.riyorawellness.com)  → SPA + /api proxy
#   - $API_DOMAIN    (default: api.riyorawellness.com)  → /api proxy ONLY
# Both share the same Let's Encrypt certificate (SAN cert, both hostnames
# added via -d flags in certbot-init.sh). scripts/deploy.sh substitutes the
# real domains via sed before starting the container.

# ---- Rate limiting zones ----------------------------------------------------
limit_req_zone $binary_remote_addr zone=auth_rl:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=api_rl:10m  rate=10r/s;

# ---- 80 → HTTPS redirect + ACME challenge ---------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name app.riyorawellness.com api.riyorawellness.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- 443 — main app site (app.riyorawellness.com) --------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name app.riyorawellness.com;

    ssl_certificate     /etc/letsencrypt/live/app.riyorawellness.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.riyorawellness.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;
    ssl_session_tickets off;
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-XSS-Protection "1; mode=block" always;

    client_max_body_size 100M;

    location ~ ^/api/auth/ {
        limit_req zone=auth_rl burst=20 nodelay;
        proxy_pass http://backend:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /api/ {
        limit_req zone=api_rl burst=60 nodelay;
        proxy_pass http://backend:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;
}

# ---- 443 — API-only site (api.riyorawellness.com) --------------------------
# Serves ONLY /api/* so Razorpay webhooks + partner integrations can hit a
# dedicated hostname. Everything else 404s (no SPA fallback here).
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.riyorawellness.com;

    # Same SAN cert issued for both app + api hostnames.
    ssl_certificate     /etc/letsencrypt/live/app.riyorawellness.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.riyorawellness.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;
    ssl_session_tickets off;
    add_header Strict-Transport-Security "max-age=63072000" always;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 100M;

    location ~ ^/api/auth/ {
        limit_req zone=auth_rl burst=20 nodelay;
        proxy_pass http://backend:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /api/ {
        limit_req zone=api_rl burst=60 nodelay;
        proxy_pass http://backend:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location / {
        return 404;
    }
}
