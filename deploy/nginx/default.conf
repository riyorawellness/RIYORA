# =============================================================================
# RIYORA Wellness — outer nginx (TLS + reverse proxy)
# Serves at $DOMAIN. /api/* → backend, everything else → frontend.
# =============================================================================
# NOTE: Replace `app.riyorawellness.com` below with your actual DOMAIN before
#       first boot. `scripts/deploy.sh` does this automatically via envsubst.

# ---- Rate limiting zones ----------------------------------------------------
# Global 300 req/min per IP for the /api/auth/* surface; 600 req/min otherwise.
limit_req_zone $binary_remote_addr zone=auth_rl:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=api_rl:10m  rate=10r/s;

# ---- 80 → HTTPS redirect + ACME challenge ---------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name app.riyorawellness.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- 443 — main site --------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name app.riyorawellness.com;

    ssl_certificate     /etc/letsencrypt/live/app.riyorawellness.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.riyorawellness.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;
    ssl_session_tickets off;
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-XSS-Protection "1; mode=block" always;

    client_max_body_size 100M;  # allow video/asset uploads

    # ---- Auth-heavy endpoints: strict rate limit ----------------------------
    location ~ ^/api/auth/ {
        limit_req zone=auth_rl burst=20 nodelay;
        proxy_pass http://backend:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ---- Rest of API --------------------------------------------------------
    location /api/ {
        limit_req zone=api_rl burst=60 nodelay;
        proxy_pass http://backend:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        # Increase for long-running admin exports (User 360 excel).
        proxy_send_timeout 120s;
    }

    # ---- Frontend SPA -------------------------------------------------------
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;
}
