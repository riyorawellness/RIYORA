# Host-level nginx — SSL termination + subdomain reverse proxy.
# Copy this to /etc/nginx/sites-available/ on the VPS AFTER Docker
# Compose is up. Then symlink into sites-enabled and reload.

# ---- api.riyorawellness.com ----
server {
    listen 80;
    server_name api.riyorawellness.com;

    client_max_body_size 25M;   # QR screenshot / certificate uploads

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# ---- app.riyorawellness.com ----
server {
    listen 80;
    server_name app.riyorawellness.com;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
