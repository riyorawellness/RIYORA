# SPA config used INSIDE the frontend container. The outer nginx (in
# deploy/nginx/default.conf) handles TLS and reverse-proxies to this
# container over the docker network.

server {
    listen 80 default_server;
    server_name _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Long cache for static assets (CRA fingerprints filenames).
    location ~* \.(?:css|js|woff2?|eot|ttf|otf|svg|ico|png|jpg|jpeg|gif|webp|avif|mp4|webm|mp3)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # The service worker must NOT be cached long-term or PWAs get stuck.
    location = /service-worker.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # SPA fallback — any unknown path returns index.html so react-router works.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store" always;
    }

    # Gzip.
    gzip on;
    gzip_vary on;
    gzip_min_length 512;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
