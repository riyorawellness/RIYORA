# In-container nginx: serves the React PWA on port 80. The HOST nginx
# (on the VPS) does SSL termination and reverse-proxies to this.
server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-cache hashed assets (CRA emits main.<hash>.js etc.)
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Service worker must NEVER be cached — it decides when to update.
    location = /service-worker.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Manifest / favicon — short cache
    location ~* \.(webmanifest|json|ico)$ {
        expires 1h;
    }

    # SPA fallback — every unknown path returns index.html
    location / {
        try_files $uri /index.html;
    }
}
